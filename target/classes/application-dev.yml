spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/coworking
    username: coworking
    password: coworking
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: false

logging:
  level:
    com.cuscatlan.coworking: DEBUG
    org.hibernate.SQL: DEBUG