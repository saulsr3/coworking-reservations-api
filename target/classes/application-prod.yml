spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  jpa:
    hibernate:
      # En prod las migraciones deberían ir por Flyway/Liquibase, no ddl-auto.
      # Se deja 'validate' para que la app falle rápido si el esquema no coincide.
      ddl-auto: validate
    show-sql: false

logging:
  level:
    root: INFO
    com.cuscatlan.coworking: INFO
