spring:
  application:
    name: coworking-reservations
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-prod-min-32-chars-long}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  payment-gateway:
    base-url: ${PAYMENT_GATEWAY_URL:http://localhost:8089}
    timeout-ms: 2000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
