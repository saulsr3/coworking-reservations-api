services:
  postgres:
    image: postgres:16-alpine
    container_name: coworking-postgres
    environment:
      POSTGRES_DB: coworking
      POSTGRES_USER: coworking
      POSTGRES_PASSWORD: coworking
    ports:
      - "5434:5432"
    volumes:
      - coworking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coworking -d coworking"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coworking-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: coworking
      DB_USER: coworking
      DB_PASSWORD: coworking
      JWT_SECRET: change-this-secret-in-prod-min-32-chars-long
      PAYMENT_GATEWAY_URL: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  coworking_pgdata: